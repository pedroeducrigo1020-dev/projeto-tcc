{% extends "base.html" %}

{% block title %}Página Não Encontrada - 404{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem;">
    <div style="font-size: 8rem; margin-bottom: 1rem;">🔍</div>
    <h1 style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;">404</h1>
    <h2 style="font-size: 1.5rem; color: var(--text-secondary); margin-bottom: 2rem;">Página não encontrada</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem; max-width: 500px; margin-left: auto; margin-right: auto;">
        A página que você está procurando não existe ou foi movida.
        Verifique o endereço ou volte para a página inicial.
    </p>
    <a href="/" class="btn btn-primary" style="display: inline-flex;">
        <i class="fas fa-home" aria-hidden="true"></i> Voltar para o Início
    </a>
</div>
{% endblock %}
